<template>
    <div class={computedIllustrationClass}>
        <span
            if:true={alternativeText}
            class="slds-assistive-text"
            data-element-id="illustration-assistive-text"
        >
            {alternativeText}
        </span>
        <img
            if:true={showSvg}
            class="slds-illustration__svg"
            src={svgURL}
            data-element-id="img"
        />
        <div class="slds-text-longform">
            <div
                class="avonni-illustration__title slds-m-bottom_small"
                data-element-id="h3"
            >
                {title}
            </div>
        </div>
        <div class="avonni-illustration__content">
            <slot></slot>
        </div>
        <slot name="cta"></slot>
    </div>
</template>
